name: Release Please

on:
  push:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

# Cancel superseded runs — release-please is idempotent so dropping a queued
# run is always safe. Group per branch so main and develop don't block each other.
concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-please:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          target-branch: ${{ github.ref_name }}
          prerelease: ${{ github.ref_name == 'develop' }}
